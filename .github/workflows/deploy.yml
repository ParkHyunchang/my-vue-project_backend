name: Backend CI/CD

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tag (lowercase)
        run: echo "IMAGE_NAME=ghcr.io/$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]'):latest" >> $GITHUB_ENV

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE_NAME }}

      - name: Deploy to NAS via SSH
        uses: appleboy/ssh-action@v1
        env:
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
          GITHUB_ACTOR: ${{ github.actor }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
        with:
          host: ${{ secrets.NAS_HOST }}
          username: ${{ secrets.NAS_USER }}
          password: ${{ secrets.NAS_SSH_PASSWORD }}
          envs: GHCR_PAT,GITHUB_ACTOR,IMAGE_NAME
          script: |
            DOCKER=/usr/local/bin/docker
            COMPOSE=/usr/local/bin/docker-compose
            export PATH="/usr/local/bin:$PATH"
            cd /volume1/docker/my-vue-project_backend
            echo "$GHCR_PAT" | $DOCKER login ghcr.io -u "$GITHUB_ACTOR" --password-stdin

            # .env 파일에서 BACKEND_IMAGE 업데이트
            if grep -q "^BACKEND_IMAGE=" .env 2>/dev/null; then
              sed -i "s|^BACKEND_IMAGE=.*|BACKEND_IMAGE=$IMAGE_NAME|" .env
            else
              echo "BACKEND_IMAGE=$IMAGE_NAME" >> .env
            fi

            $COMPOSE pull backend
            $COMPOSE up -d --no-deps backend
            $DOCKER image prune -f
            echo "✅ 백엔드 배포 완료!"
            $COMPOSE ps

      - name: Verify backend startup (check Docker logs)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.NAS_HOST }}
          username: ${{ secrets.NAS_USER }}
          password: ${{ secrets.NAS_SSH_PASSWORD }}
          script: |
            DOCKER=/usr/local/bin/docker
            export PATH="/usr/local/bin:$PATH"
            echo "⏳ Waiting 25s for backend to start..."
            sleep 25
            echo ""
            echo "=== Backend container log (last 150 lines) ==="
            LOGS=$($DOCKER logs vue_personal_project-backend --tail 150 2>&1)
            echo "$LOGS"
            echo ""
            if echo "$LOGS" | grep -qE "Access denied|Application run failed|Error starting ApplicationContext|Error starting Tomcat"; then
              echo "::error::Backend container log contains critical errors - check deployment and DB config"
              exit 1
            fi
            if echo "$LOGS" | grep -q "Started WebApplication"; then
              echo "✅ Backend started successfully (Started WebApplication found in log)"
            else
              echo "::warning::Started WebApplication not found in log - backend may still be starting or failed"
            fi
