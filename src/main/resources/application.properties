# Common Configuration (공통 설정)

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Server Configuration
server.port=3200

# Logging
logging.level.org.springframework.web=INFO
logging.level.org.springframework.web.servlet.DispatcherServlet=WARN
logging.level.org.springframework.web.servlet.handler.SimpleUrlHandlerMapping=INFO
logging.level.org.springframework.web.servlet.resource.ResourceHttpRequestHandler=INFO
logging.level.org.hibernate.SQL=INFO

# prefix
# server.servlet.context-path=/my-vue-project

# H2 Database Configuration
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Bean Override
spring.main.allow-bean-definition-overriding=true

# Default profile (로컬 개발용)
spring.profiles.active=local

# File Upload Configuration
spring.servlet.multipart.max-file-size=250MB
spring.servlet.multipart.max-request-size=1GB

# JWT Configuration
jwt.secret=mySecretKeyForJWTTokenGeneration123456789
jwt.expiration=86400000

# Admin Users Configuration
admin.users=hyunchang88,admin