# Docker Profile (운영용 Docker 컨테이너)
# 개발용 docker 테스트가 필요하면 application-docker-dev.yml을 별도로 만들어 사용하세요.
# show-sql: false, ddl-auto: validate 는 운영 환경에서 필수입니다.

spring:
  datasource:
    url: jdbc:mysql://db:3306/vue_personal_project_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
  servlet:
    multipart:
      max-file-size: '1GB'
      max-request-size: '5GB'

logging:
  level:
    org.hibernate.SQL: WARN
    org.springframework.web: INFO

server:
  tomcat:
    # max-http-form-post-size: x-www-form-urlencoded 본문 한도. multipart에는 적용되지 않음.
    # 기본 2MB로 두되 일부 폼 전송을 위해 10MB로 제한.
    max-http-form-post-size: 10MB

jwt:
  cookie-secure: ${JWT_COOKIE_SECURE:false}
  cookie-domain: ${JWT_COOKIE_DOMAIN:}

# CORS 허용 도메인 (운영 환경)
# Synology 역방향 프록시로 HTTPS 종료(3101=Vue, 3201=API). 평문/raw IP origin 제거.
# 프론트엔드는 nginx /api/ 프록시로 same-origin 호출이라 CORS 자체가 불필요하지만,
# 직접 호출/모바일/리프레시 경로 대비 HTTPS origin 만 명시적으로 허용.
# 환경변수로 재정의 가능: APP_CORS_ALLOWED_ORIGINS=도메인1,도메인2,...
app:
  cors:
    allowed-origins: "https://hyunchang.synology.me:3101,https://hyunchang.synology.me:3201,https://m.hyunchang.synology.me:3101,https://m.hyunchang.synology.me:3201"
