# Docker Profile (운영용 Docker 컨테이너)
# 개발용 docker 테스트가 필요하면 application-docker-dev.yml을 별도로 만들어 사용하세요.
# show-sql: false, ddl-auto: validate 는 운영 환경에서 필수입니다.

spring:
  datasource:
    url: jdbc:mysql://db:3306/vue_personal_project_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
  servlet:
    multipart:
      max-file-size: '3GB'
      max-request-size: '15GB'

logging:
  level:
    org.hibernate.SQL: WARN
    org.springframework.web: INFO

server:
  tomcat:
    max-http-form-post-size: -1
    max-swallow-size: -1

# CORS 허용 도메인 (운영 환경)
# 환경변수로 재정의 가능: APP_CORS_ALLOWED_ORIGINS=도메인1,도메인2,...
app:
  cors:
    allowed-origins: "http://hyunchang.synology.me:3100,http://hyunchang.synology.me:3200,http://m.hyunchang.synology.me:3100,http://m.hyunchang.synology.me:3200,https://hyunchang.synology.me:3100,https://hyunchang.synology.me:3200,https://m.hyunchang.synology.me:3100,https://m.hyunchang.synology.me:3200,http://125.141.20.218:3100,http://125.141.20.218:3200"
