# Common Configuration (공통 설정)
# ddl-auto / show-sql 는 각 프로파일 yml에서 설정합니다.
# Docker/NAS 배포 시 환경변수 SPRING_PROFILES_ACTIVE 로 프로파일을 덮어씁니다.

# JPA Configuration
spring:
  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect

  # Bean Override
  main:
    allow-bean-definition-overriding: true

  # H2 Database Configuration
  h2:
    console:
      enabled: true
      path: /h2-console

  # 로컬 개발 기본 프로파일 (Docker/NAS 배포 시 SPRING_PROFILES_ACTIVE 환경변수로 덮어씀)
  profiles:
    active: local

  # File Upload Configuration
  # 단일 파일 1GB / 요청 전체 5GB. 사진 다수 일괄 업로드 + 고해상도 영상 대응.
  servlet:
    multipart:
      max-file-size: 1GB
      max-request-size: 5GB

# Server Configuration
server:
  port: 3200
  # prefix
  # servlet:
  #   context-path: /my-vue-project

# Logging
logging:
  level:
    org.springframework.web: INFO
    org.springframework.web.servlet.DispatcherServlet: WARN
    org.springframework.web.servlet.handler.SimpleUrlHandlerMapping: INFO
    org.springframework.web.servlet.resource.ResourceHttpRequestHandler: INFO
    org.hibernate.SQL: INFO

# SpringDoc / Swagger UI
# prod 프로파일에서는 application-prod.yml 에서 enabled: false 로 비활성화됨
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    disable-swagger-default-url: true

# JWT Configuration
# access-expiration: 15분, refresh-expiration: 7일
# 쿠키 옵션: cookie-secure는 HTTPS 환경에서만 true
jwt:
  secret: ${JWT_SECRET}
  access-expiration: 900000
  refresh-expiration: 604800000
  cookie-secure: false
  cookie-domain: ""

# Admin Users Configuration
admin:
  users: ${ADMIN_USERS:hyunchang88,admin}

# Alpha Vantage Stock API (https://www.alphavantage.co)
# 무료 한도: 25 calls/day, 5 calls/min
alphavantage:
  api-key: ${ALPHAVANTAGE_API_KEY}

# OpenDART 전자공시 (국내 재무제표) — https://opendart.fss.or.kr
# 비워두면 국내 재무 연동 비활성(시세·뉴스 기반으로만 분석)
dart:
  api-key: ${DART_API_KEY:}


# Anthropic Claude API
anthropic:
  api-key: ${ANTHROPIC_API_KEY}

# AI 종목 분석용 무료 AI Provider 체인 (Gemini → Groq → Cloudflare)
# 1차 Gemini만 필수, 나머지는 비워두면 자동으로 chain에서 skip
gemini:
  api-key: ${GEMINI_API_KEY:}
groq:
  api-key: ${GROQ_API_KEY:}
cloudflare:
  api-token: ${CLOUDFLARE_API_TOKEN:}
  account-id: ${CLOUDFLARE_ACCOUNT_ID:}

# CORS 허용 도메인 (로컬 개발 기본값, 배포 환경에서는 각 프로파일 yml에서 재정의)
# 환경변수로 재정의 가능: APP_CORS_ALLOWED_ORIGINS=도메인1,도메인2,...
app:
  cors:
    allowed-origins: "http://localhost:8080,http://localhost:3100,http://localhost:3200,http://127.0.0.1:8080,http://127.0.0.1:3100,http://127.0.0.1:3200"
  upload-base-url: ${UPLOAD_BASE_URL:}
  krx:
    expiry-date: "2027-04-21"
  # 국토교통부 아파트·토지 실거래가 공개 API (data.go.kr)
  # 서비스키는 환경변수 REALESTATE_API_KEY 로 주입 (미설정 시 부동산 검색 비활성)
  realestate:
    service-key: ${REALESTATE_API_KEY:}
    # 개별공시지가는 VWorld(api.vworld.kr/ned/data) 데이터 API 사용 — VWorld 발급 키
    land-key: ${REALLAND_API_KEY:}
    # VWorld 키 발급 시 등록한 서비스 URL/도메인 (요청 도메인 검증용)
    land-domain: ${VWORLD_DOMAIN:hyunchang.synology.me:3101}

# 키움 REST / WebSocket 설정
# 실제 키는 절대 저장소에 넣지 말고 환경 변수(KIWOOM_APP_KEY, KIWOOM_SECRET_KEY)로만 주입합니다.
# 안전을 위해 기본값은 모의투자이며, 주문 전송은 별도의 명시적 환경 변수로만 켜집니다.
kiwoom:
  mode: ${KIWOOM_MODE:mock} # mock | live
  app-key: ${KIWOOM_APP_KEY:}
  secret-key: ${KIWOOM_SECRET_KEY:}
  account-no: ${KIWOOM_ACCOUNT_NO:}
  trade-enabled: ${KIWOOM_TRADE_ENABLED:false}
  refresh-before-seconds: ${KIWOOM_REFRESH_BEFORE_SECONDS:300}
  min-request-interval-ms: ${KIWOOM_MIN_REQUEST_INTERVAL_MS:250}
