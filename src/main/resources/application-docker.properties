# 대용량 멀티파트 업로드를 위해 HTTP 폼 본문 크기 제한 해제 (-1 = 무제한)
server.tomcat.max-http-form-post-size=-1

# 업로드 실패 시 남은 요청 본문을 “삼킬” 때의 크기 제한 해제 (-1 = 무제한)
server.tomcat.max-swallow-size=-1