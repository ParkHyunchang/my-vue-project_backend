# NAS 배포용 설정
# Common Configuration (공통 설정)

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Server Configuration
server.port=3200

# Logging
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=INFO

# prefix
# server.servlet.context-path=/my-vue-project

# H2 Database Configuration
spring.h2.console.enabled=false
spring.h2.console.path=/h2-console

# Bean Override
spring.main.allow-bean-definition-overriding=true

# Default profile (NAS 배포용)
spring.profiles.active=nas

# File Upload Configuration
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# JWT Configuration
jwt.secret=mySecretKeyForJWTTokenGeneration123456789
jwt.expiration=86400000

# Admin Users Configuration (NAS 배포 시 수정)
# 허용된 관리자 사용자명을 쉼표로 구분하여 입력
# 예: admin.users=hyunchang88,admin,superuser
admin.users=hyunchang88,admin
