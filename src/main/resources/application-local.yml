# Local Development Profile (로컬 개발용)

spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:3306/vue_personal_project_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  servlet:
    multipart:
      max-file-size: '3GB'
      max-request-size: '15GB'

# 로컬 개발 시 아래 환경변수를 IDE 실행 설정 또는 OS 환경변수로 반드시 설정하세요.
# DB_USERNAME, DB_PASSWORD, JWT_SECRET, ALPHAVANTAGE_API_KEY
jwt:
  secret: ${JWT_SECRET}

alphavantage:
  api-key: ${ALPHAVANTAGE_API_KEY}

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
