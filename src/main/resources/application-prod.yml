# Production Profile (NAS/배포용)

spring:
  datasource:
    url: jdbc:mysql://db:3306/vue_personal_project_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    show-sql: false
  servlet:
    multipart:
      max-file-size: '3GB'
      max-request-size: '15GB'

logging:
  level:
    org.hibernate.SQL: WARN
    org.springframework.web: INFO
