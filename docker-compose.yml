version: "3.8"
services:
  db:
    image: mysql:8.0
    container_name: vue_personal_project-backend-db
    environment:
      TZ: Asia/Seoul
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    command: 
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    restart: always
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 5s
      retries: 10

  backend:
    image: ${BACKEND_IMAGE:-ghcr.io/parkhyunchang/my-vue-project_backend:latest}
    container_name: vue_personal_project-backend
    ports:
      - "3200:3200"
    environment:
      TZ: Asia/Seoul
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/${MYSQL_DATABASE}?useSSL=false&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      # JWT 쿠키 옵션 (Synology 역방향 프록시로 HTTPS 종료 → Secure 쿠키 필수)
      JWT_COOKIE_SECURE: ${JWT_COOKIE_SECURE:-true}
      JWT_COOKIE_DOMAIN: ${JWT_COOKIE_DOMAIN:-}
      ALPHAVANTAGE_API_KEY: ${ALPHAVANTAGE_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      KRX_API_KEY: ${KRX_API_KEY}
      # AI 종목 분석 provider 체인 (Gemini → Groq → Cloudflare)
      # GEMINI 만 필수, 나머지는 비워두면 chain 에서 자동 skip
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      CLOUDFLARE_API_TOKEN: ${CLOUDFLARE_API_TOKEN:-}
      CLOUDFLARE_ACCOUNT_ID: ${CLOUDFLARE_ACCOUNT_ID:-}
      ADMIN_USERS: ${ADMIN_USERS:-hyunchang88,admin}
    volumes:
      - /volume1/docker/my-vue-project_backend/uploads:/volume1/docker/my-vue-project_backend/uploads:Z
      - /volume1/docker/my-vue-project_backend/logs:/app/logs:Z
      - /volume1/docker/my-vue-project_backend/data:/app/data:Z
    depends_on:
      db:
        condition: service_healthy
    restart: always

volumes:
  db_data: